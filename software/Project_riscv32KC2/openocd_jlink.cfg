# OpenOCD configuration for AI RISC-V KC32 System
# Based on RISC-V Debug Specification 0.13

adapter speed 1000

adapter driver jlink
transport select jtag

# RISC-V target configuration
set _CHIPNAME riscv
jtag newtap $_CHIPNAME cpu -irlen 5

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME riscv -chain-position $_TARGETNAME

# Increase timeout
riscv set_command_timeout_sec 1
#debug_level 3
#log_output openocd1.log
# Work area in Instruction RAM (16KB available)
$_TARGETNAME configure -work-area-phys 0x80000000 -work-area-size 0x4000 -work-area-backup 1

# Initialize and halt
init
halt



