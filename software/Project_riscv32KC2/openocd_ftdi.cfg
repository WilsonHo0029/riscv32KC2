# OpenOCD configuration for AI RISC-V KC32 System
# Based on RISC-V Debug Specification 0.13

adapter speed 1000

# FTDI interface configuration
# Adjust these based on your JTAG adapter
adapter driver ftdi
ftdi_vid_pid 0x0403 0x6011
ftdi_device_desc "FT4232H Device"

transport select jtag

ftdi_layout_init 0x0008 0x001b
ftdi_layout_signal nSRST -oe 0x0020 -data 0x0020
ftdi_layout_signal TCK -data 0x0001
ftdi_layout_signal TDI -data 0x0002
ftdi_layout_signal TDO -input 0x0004
ftdi_layout_signal TMS -data 0x0008
ftdi_layout_signal JTAG_SEL -data 0x0100 -oe 0x0100

# RISC-V target configuration
set _CHIPNAME riscv
jtag newtap $_CHIPNAME cpu -irlen 5

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME riscv -chain-position $_TARGETNAME

# Increase timeout
riscv set_command_timeout_sec 1
debug_level 3
log_output openocd1.log
# Work area in Instruction RAM (16KB available)
$_TARGETNAME configure -work-area-phys 0x80000000 -work-area-size 0x4000 -work-area-backup 1

# Initialize and halt
init
halt

# Reset handling
if {[ info exists pulse_srst]} {
  ftdi_set_signal nSRST 0
  ftdi_set_signal nSRST z
}


