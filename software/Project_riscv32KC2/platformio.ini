; PlatformIO Project Configuration File
; AI RISC-V KC32 System
; Architecture: RV32IMAC_Zicsr_Zifencei

[env:riscv32KC2]
platform = riscv32KC2
board = riscv32KC2
framework = riscv32KC2-sdk

; Explicitly point to local framework directory
; Using relative path from project directory (../framework/...)
platform_packages = 
    framework-riscv32KC2-sdk = file://../framework/framework-riscv32KC2-sdk

; Custom linker script for riscv32KC2 memory map
board_build.ldscript = linker.lds

; Build flags
build_flags = 
    -march=rv32imac
    -mabi=ilp32
    -mcmodel=medany
    -ffunction-sections
    -fdata-sections
    -Wall
    -Wextra
    -Os

; Upload configuration using OpenOCD
upload_protocol = custom
upload_port = 
upload_command = 
    ${platformio_packages_dir}/tool-openocd/bin/openocd.exe
    -f
    ${PROJECT_DIR}/openocd.cfg
	-c
	"reset"
	-c
	"halt"
    -c
    "load_image ${PROJECT_DIR}/.pio/build/${PIOENV}/firmware.elf"
    -c
    "verify_image ${PROJECT_DIR}/.pio/build/${PIOENV}/firmware.elf"	
    -c
	"resume 0x80000000"
	-c
	"shutdown"
; Debug configuration
debug_tool = custom
debug_server = 
    ${platformio_packages_dir}/tool-openocd/bin/openocd.exe
    -f
    ${PROJECT_DIR}/openocd.cfg

; Monitor configuration (for serial output)
monitor_speed = 115200
monitor_filters = 
    default
    send_on_enter


