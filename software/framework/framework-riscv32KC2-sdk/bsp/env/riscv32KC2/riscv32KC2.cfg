# AI RISC-V KC32 System target configuration
# Based on RISC-V Debug Specification 0.13

set _CHIPNAME riscv
jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x1e200a6d

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME riscv -chain-position $_TARGETNAME

# Work area in Instruction RAM
$_TARGETNAME configure -work-area-phys 0x80000000 -work-area-size 10000 -work-area-backup 1

# Initialize and halt
init
halt

# Reset handling
if {[ info exists pulse_srst]} {
  ftdi_set_signal nSRST 0
  ftdi_set_signal nSRST z
}

# Reset to boot ROM address
$_TARGETNAME configure -event reset-init {
    # Set PC to boot ROM start address
    reg pc 0x00001000
}

